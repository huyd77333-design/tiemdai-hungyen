<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Báo Cáo Tiêm Dại – Hưng Yên</title>
    
    <!-- Nhúng thư viện ExcelJS ổn định để xuất file -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .header-title {
            text-align: center;
            color: #0056b3;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .sub-title {
            text-align: center;
            font-style: italic;
            color: #666;
            margin-bottom: 25px;
        }
        
        /* Form nhập liệu */
        .form-group-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-control {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        .form-control:focus {
            border-color: #0056b3;
        }
        
        /* Nút bấm */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add { background-color: #007bff; color: white; }
        .btn-add:hover { background-color: #0056b3; }
        .btn-export { background-color: #28a745; color: white; }
        .btn-export:hover { background-color: #218838; }
        
        /* Bảng dữ liệu hiển thị */
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #fff;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: #e9ecef;
            font-weight: bold;
            color: #495057;
            text-align: center;
        }
        .text-center { text-align: center; }
        .no-data {
            text-align: center;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="header-title">Hệ Thống Quản Lý & Báo Cáo Tiêm Dại Hưng Yên</h2>
        <p class="sub-title">Nhập liệu danh sách đối tượng và xuất báo cáo theo định dạng chuẩn</p>
        
        <!-- FORM NHẬP LIỆU (ĐÃ XOÁ BỎ HOÀN TOÀN READONLY) -->
        <div class="form-group-container">
            <div class="form-group">
                <label for="hoTen">Họ và tên:</label>
                <input type="text" id="hoTen" class="form-control" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label for="tuoi">Tuổi:</label>
                <input type="number" id="tuoi" class="form-control" placeholder="Ví dụ: 30">
            </div>
            <div class="form-group">
                <label for="diaChi">Địa chỉ:</label>
                <input type="text" id="diaChi" class="form-control" placeholder="Xã, Huyện, Hưng Yên">
            </div>
            <div class="form-group">
                <label for="ngayTiem">Ngày tiêm:</label>
                <input type="date" id="ngayTiem" class="form-control">
            </div>
            <div class="form-group">
                <label for="loaiVacXin">Loại vắc xin:</label>
                <input type="text" id="loaiVacXin" class="form-control" placeholder="Verorab / Abhayrab">
            </div>
            <div class="form-group">
                <label for="muiTiem">Mũi tiêm:</label>
                <input type="text" id="muiTiem" class="form-control" placeholder="Mũi 1, Mũi 2...">
            </div>
            <div class="form-group">
                <label for="huyetThanh">Huyết thanh:</label>
                <select id="huyetThanh" class="form-control">
                    <option value="Không">Không</option>
                    <option value="Có">Có</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ghiChu">Ghi chú:</label>
                <input type="text" id="ghiChu" class="form-control" placeholder="Nếu có">
            </div>
        </div>
        
        <!-- KHU VỰC NÚT BẤM CHỨC NĂNG -->
        <div class="btn-group">
            <button class="btn-add" onclick="themDoiTuong()">Thêm Đối Tượng</button>
            <button class="btn-export" onclick="xuatExcel()">Xuất Báo Cáo Excel</button>
        </div>
        
        <!-- BẢNG HIỂN THỊ DANH SÁCH TẠM THỜI -->
        <h3>Danh sách đối tượng vừa nhập</h3>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">STT</th>
                        <th>Họ và tên</th>
                        <th style="width: 70px;">Tuổi</th>
                        <th>Địa chỉ</th>
                        <th>Ngày tiêm</th>
                        <th>Loại vắc xin</th>
                        <th>Mũi tiêm</th>
                        <th>Huyết thanh</th>
                        <th>Ghi chú</th>
                    </tr>
                </thead>
                <tbody id="danhSachTable">
                    <tr>
                        <td colspan="9" class="no-data">Chưa có dữ liệu nào được thêm. Hãy nhập liệu ở trên!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- TOÀN BỘ SCRIPT XỬ LÝ LOGIC CHẠY TRANG WEB -->
    <script>
        // Mảng lưu trữ dữ liệu đối tượng tiêm chủng
        let database = [];

        // 1. Hàm tự động điền ngày hôm nay vào ô ngày tiêm khi mở trang
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('ngayTiem').value = today;
        };

        // 2. Hàm thêm đối tượng vào bảng hiển thị và lưu vào database
        function themDoiTuong() {
            const hoTen = document.getElementById('hoTen').value.trim();
            const tuoi = document.getElementById('tuoi').value.trim();
            const diaChi = document.getElementById('diaChi').value.trim();
            let ngayTiem = document.getElementById('ngayTiem').value;
            const loaiVacXin = document.getElementById('loaiVacXin').value.trim();
            const muiTiem = document.getElementById('muiTiem').value.trim();
            const huyetThanh = document.getElementById('huyetThanh').value;
            const ghiChu = document.getElementById('ghiChu').value.trim();

            // Kiểm tra validate cơ bản
            if (!hoTen || !tuoi) {
                alert("Vui lòng điền ít nhất thông tin Họ tên và Tuổi!");
                return;
            }

            // Định dạng lại ngày hiển thị DD/MM/YYYY cho đẹp mắt
            let ngayHienThi = ngayTiem;
            if (ngayTiem) {
                const parts = ngayTiem.split('-');
                ngayHienThi = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            // Đẩy dữ liệu vào mảng lưu trữ
            database.push({
                stt: database.length + 1,
                hoTen,
                tuoi: parseInt(tuoi),
                diaChi,
                ngayTiem: ngayHienThi,
                loaiVacXin,
                muiTiem,
                huyetThanh,
                ghiChu
            });

            // Cập nhật lại giao diện bảng HTML
            renderTable();

            // Xóa sạch form cũ để người dùng nhập tiếp người mới (giữ lại ngày tiêm và loại vắc xin)
            document.getElementById('hoTen').value = '';
            document.getElementById('tuoi').value = '';
            document.getElementById('diaChi').value = '';
            document.getElementById('ghiChu').value = '';
            document.getElementById('hoTen').focus();
        }

        // Hàm vẽ lại bảng dữ liệu trên web
        function renderTable() {
            const tbody = document.getElementById('danhSachTable');
            if (database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="no-data">Chưa có dữ liệu nào được thêm. Hãy nhập liệu ở trên!</td></tr>`;
                return;
            }

            let html = '';
            database.forEach((item, index) => {
                html += `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td>${item.hoTen}</td>
                        <td class="text-center">${item.tuoi}</td>
                        <td>${item.diaChi}</td>
                        <td class="text-center">${item.ngayTiem}</td>
                        <td>${item.loaiVacXin}</td>
                        <td>${item.muiTiem}</td>
                        <td class="text-center">${item.huyetThanh}</td>
                        <td>${item.ghiChu}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // 3. Hàm xử lý xuất toàn bộ mảng dữ liệu sang File Excel chuẩn Sở Y Tế
        async function xuatExcel() {
            if (database.length === 0) {
                alert("Bảng hiện tại chưa có dữ liệu. Hãy thêm ít nhất 1 đối tượng trước khi xuất Excel!");
                return;
            }

            try {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Báo cáo');

                // --- 1. Tiêu đề Đơn vị và Quốc hiệu ---
                const rowInst = worksheet.addRow(['SỞ Y TẾ HƯNG YÊN', '', 'CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM']);
                const rowSubInst = worksheet.addRow(['TRUNG TÂM KIỂM SOÁT BỆNH TẬT', '', 'Độc lập - Tự do - Hạnh phúc']);
                
                worksheet.mergeCells('A1:B1');
                worksheet.mergeCells('A2:B2');
                worksheet.mergeCells('C1:I1');
                worksheet.mergeCells('C2:I2');

                [rowInst, rowSubInst].forEach(row => {
                    row.eachCell(cell => {
                        cell.font = { name: 'Times New Roman', size: 11, bold: true };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    });
                });

                // --- 2. Tiêu đề văn bản chính ---
                worksheet.addRow([]); // Dòng trống
                const rowTitle = worksheet.addRow(['BÁO CÁO ĐỐI TƯỢNG TIÊM VẮC XIN, HUYẾT THANH KHÁNG DẠI']);
                worksheet.mergeCells('A4:I4');
                rowTitle.getCell(1).font = { name: 'Times New Roman', size: 16, bold: true };
                rowTitle.getCell(1).alignment = { horizontal: 'center', vertical: 'middle' };

                // Lấy tháng năm hiện tại làm tiêu đề phụ
                const currentMonth = new Date().getMonth() + 1;
                const currentYear = new Date().getFullYear();
                const rowSubTitle = worksheet.addRow([`Tháng ${currentMonth < 10 ? '0'+currentMonth : currentMonth} Năm ${currentYear}`]);
                worksheet.mergeCells('A5:I5');
                rowSubTitle.getCell(1).font = { name: 'Times New Roman', size: 11, italic: true };
                rowSubTitle.getCell(1).alignment = { horizontal: 'center', vertical: 'middle' };

                worksheet.addRow([]); // Dòng trống

                // --- 3. Tạo Tiêu đề các cột cho Bảng ---
                const headers = ['STT', 'Họ và tên', 'Tuổi', 'Địa chỉ', 'Ngày tiêm', 'Loại vắc xin', 'Mũi tiêm', 'Huyết thanh', 'Ghi chú'];
                const rowHeader = worksheet.addRow(headers);
                rowHeader.eachCell(cell => {
                    cell.font = { name: 'Times New Roman', size: 11, bold: true };
                    cell.fill = {
                        type: 'pattern',
                        pattern: 'solid',
                        fgColor: { argb: 'FFE0E0E0' }
                    };
                    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                    cell.border = {
                        top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' }
                    };
                });

                // --- 4. Đổ dữ liệu người dùng đã nhập từ Web vào Excel ---
                database.forEach((item, index) => {
                    const rowData = [
                        index + 1,
                        item.hoTen,
                        item.tuoi,
                        item.diaChi,
                        item.ngayTiem,
                        item.loaiVacXin,
                        item.muiTiem,
                        item.huyetThanh,
                        item.ghiChu
                    ];
                    const row = worksheet.addRow(rowData);
                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Times New Roman', size: 11 };
                        cell.border = {
                            top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' }
                        };
                        // Căn lề số thứ tự, tuổi, ngày tiêm ở giữa, còn lại ở trái
                        if ([1, 3, 5, 7, 8].includes(colNumber)) {
                            cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        } else {
                            cell.alignment = { horizontal: 'left', vertical: 'middle' };
                        }
                    });
                });

                // Cấu hình tự động căn chỉnh khoảng cách rộng/hẹp cột hợp lý
                worksheet.columns.forEach(column => {
                    let maxLength = 12;
                    column.eachCell({ includeEmpty: true }, cell => {
                        const columnLength = cell.value ? cell.value.toString().length : 0;
                        if (columnLength > maxLength) maxLength = columnLength;
                    });
                    column.width = maxLength + 4;
                });

                // --- 5. Đóng gói file và bắt đầu tải xuống ---
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a');
                
                const formattedDate = new Date().toISOString().slice(0,10);
                const fileName = `BaoCao_TiemDai_HungYen_${formattedDate}.xlsx`;
                
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                link.click();
                
                alert(`Xuất file thành công: ${fileName}`);
            } catch (error) {
                console.error(error);
                alert("Lỗi xuất Excel: Không thể tạo file. Vui lòng thử lại!");
            }
        }
    </script>
</body>
</html>
