<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xuất Báo Cáo Tiêm Dại – Hưng Yên</title>
    
    <!-- Nhúng thư viện ExcelJS để chạy được hàm xuatExcel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #0056b3; margin-bottom: 20px; }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Hệ Thống Xuất Báo Cáo Tiêm Dại</h2>
        <p>Bấm vào nút bên dưới để tải file báo cáo Excel định dạng chuẩn.</p>
        <!-- Nút bấm gọi hàm xuất Excel -->
        <button onclick="xuatExcel()">Xuất Báo Cáo Excel</button>
    </div>

    <!-- TOÀN BỘ CODE JAVASCRIPT CỦA BẠN ĐƯỢC ĐẶT TRONG THẺ SCRIPT NÀY -->
    <script>
        /** ==========================================
         * HÀM XUẤT EXCEL BÁO CÁO TIÊM DẠI HƯNG YÊN
         * ========================================== */
        async function xuatExcel() {
            try {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Báo cáo');

                // --- 1. Thêm Tiêu đề đơn vị ---
                const rowInst = worksheet.addRow(['SỞ Y TẾ HƯNG YÊN', '', 'CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM']);
                const rowSubInst = worksheet.addRow(['TRUNG TÂM KIỂM SOÁT BỆNH TẬT', '', 'Độc lập - Tự do - Hạnh phúc']);
                
                worksheet.mergeCells('A1:B1');
                worksheet.mergeCells('A2:B2');
                worksheet.mergeCells('C1:I1');
                worksheet.mergeCells('C2:I2');

                // Định dạng tiêu đề đơn vị
                [rowInst, rowSubInst].forEach(row => {
                    row.eachCell(cell => {
                        cell.font = { name: 'Times New Roman', size: 11, bold: true };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    });
                });

                // --- 2. Thêm Tiêu đề chính ---
                worksheet.addRow([]); // Dòng trống
                const rowTitle = worksheet.addRow(['BÁO CÁO ĐỐI TƯỢNG TIÊM VẮC XIN, HUYẾT THANH KHÁNG DẠI']);
                worksheet.mergeCells('A4:I4');
                rowTitle.getCell(1).font = { name: 'Times New Roman', size: 16, bold: true };
                rowTitle.getCell(1).alignment = { horizontal: 'center', vertical: 'middle' };

                const rowSubTitle = worksheet.addRow(['Tháng 02 Năm 2025']);
                worksheet.mergeCells('A5:I5');
                rowSubTitle.getCell(1).font = { name: 'Times New Roman', size: 11, italic: true };
                rowSubTitle.getCell(1).alignment = { horizontal: 'center', vertical: 'middle' };

                worksheet.addRow([]); // Dòng trống

                // --- 3. Cấu trúc Header bảng ---
                const headers = [
                    ['STT', 'Họ và tên', 'Tuổi', 'Địa chỉ', 'Ngày tiêm', 'Loại vắc xin', 'Mũi tiêm', 'Huyết thanh', 'Ghi chú']
                ];
                
                headers.forEach(headerRow => {
                    const row = worksheet.addRow(headerRow);
                    row.eachCell(cell => {
                        cell.font = { name: 'Times New Roman', size: 11, bold: true };
                        cell.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb: 'FFE0E0E0' }
                        };
                        cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                        cell.border = {
                            top: { style: 'thin' },
                            left: { style: 'thin' },
                            bottom: { style: 'thin' },
                            right: { style: 'thin' }
                        };
                    });
                });

                // --- 4. Dữ liệu mẫu ---
                const mockData = [
                    [1, 'Nguyễn Văn A', 35, 'TP. Hưng Yên', '05/02/2025', 'Verorab', 'Mũi 1', 'Không', ''],
                    [2, 'Trần Thị B', 12, 'Khoái Châu, Hưng Yên', '06/02/2025', 'Verorab', 'Mũi 2', 'Có', ''],
                    [3, 'Phạm Văn C', 48, 'Kim Động, Hưng Yên', '07/02/2025', 'Abhayrab', 'Mũi 1', 'Không', '']
                ];

                mockData.forEach(dataRow => {
                    const row = worksheet.addRow(dataRow);
                    row.eachCell((cell, colNumber) => {
                        cell.font = { name: 'Times New Roman', size: 11 };
                        cell.border = {
                            top: { style: 'thin' },
                            left: { style: 'thin' },
                            bottom: { style: 'thin' },
                            right: { style: 'thin' }
                        };
                        // Căn lề: STT, Tuổi, Ngày, Mũi tiêm căn giữa. Còn lại căn trái.
                        if ([1, 3, 5, 7].includes(colNumber)) {
                            cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        } else {
                            cell.alignment = { horizontal: 'left', vertical: 'middle' };
                        }
                    });
                });

                // Tự động điều chỉnh độ rộng cột
                worksheet.columns.forEach(column => {
                    let maxLength = 12;
                    column.eachCell({ includeEmpty: true }, cell => {
                        const columnLength = cell.value ? cell.value.toString().length : 0;
                        if (columnLength > maxLength) {
                            maxLength = columnLength;
                        }
                    });
                    column.width = maxLength + 3;
                });

                // --- 5. Xuất file và tải về ---
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a');
                
                const fileName = `BaoCao_TiemDai_HungYen_${new Date().toISOString().slice(0,10)}.xlsx`;
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                link.click();
                
                console.log(`✅ Đã xuất file thành công: ${fileName}`);
            } catch (error) {
                console.error("❌ Có lỗi xảy ra khi xuất Excel:", error);
                alert("Không thể xuất file Excel. Vui lòng kiểm tra lại mã nguồn.");
            }
        }
    </script>
</body>
</html>
